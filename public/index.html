<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>4th of July Board</title>
    <style>
      :root {
        color-scheme: light dark;
        /* Old Glory flag colors */
        --red: #b22234;
        --navy: #3c3b6e;
        --bg: #fbf8f2; --fg: #1b2340; --muted: #6b6f86; --border: #e6ddcd;
        --card: #ffffff; --accent: #b22234; --accent-fg: #ffffff; --accent-soft: #f7e4e6;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --red: #e2565f; --navy: #8a8ad6;
          --bg: #0d1530; --fg: #eef1fb; --muted: #97a0c0; --border: #24305a;
          --card: #16204a; --accent: #d33d4c; --accent-fg: #ffffff; --accent-soft: #2a1c2e;
        }
      }
      * { box-sizing: border-box; margin: 0; }
      body::before {
        content: ""; display: block; height: 4px;
        background: linear-gradient(90deg, var(--red) 0 33.3%, #ffffff 33.3% 66.6%, var(--navy) 66.6% 100%);
      }
      body { background: var(--bg); color: var(--fg); font-family: var(--font); line-height: 1.5; }
      .topbar, nav.tabs, main, footer, .gate { width: min(42rem, 100% - 2rem); margin-inline: auto; }
      .topbar { display: flex; align-items: baseline; justify-content: space-between; padding: 1.5rem 0 0.5rem; }
      .topbar h1 { font-size: 1.5rem; letter-spacing: -0.02em; color: var(--navy); }
      .me { color: var(--muted); font-size: 0.9rem; }

      nav.tabs { display: flex; gap: 0.35rem; overflow-x: auto; padding-bottom: 0.5rem; }
      .tab { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 999px; padding: 0.35rem 0.85rem; font: inherit; font-weight: 600; cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 0.4rem; }
      .tab.on { background: var(--navy); border-color: var(--navy); color: #fff; }
      .tab-count { font-size: 0.7rem; background: var(--accent-soft); color: var(--accent); border-radius: 999px; padding: 0 0.4rem; min-width: 1.25rem; text-align: center; }
      .tab.on .tab-count { background: rgba(255,255,255,0.22); color: #fff; }

      main { display: grid; gap: 1rem; padding-block: 1rem; }
      .gate { padding-top: 4rem; text-align: center; }
      .gate h1 { font-size: 2rem; color: var(--navy); }
      .gate .add { max-width: 22rem; margin-inline: auto; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.1rem 1.25rem; box-shadow: 0 1px 2px rgba(27, 35, 64, 0.04); }

      .add { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
      .add input { flex: 1; padding: 0.5rem 0.7rem; border: 1px solid var(--border); border-radius: 0.5rem; background: var(--bg); color: var(--fg); font: inherit; }
      input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
      button { border: none; border-radius: 0.5rem; padding: 0.5rem 0.9rem; background: var(--accent); color: var(--accent-fg); font: inherit; font-weight: 600; cursor: pointer; }
      button:hover { filter: brightness(1.05); }
      button.link { background: none; color: var(--accent); padding: 0; font-weight: 400; text-decoration: underline; }
      button.mini { padding: 0.25rem 0.6rem; font-size: 0.8rem; }
      button.mini.on { background: var(--navy); }

      .toolbar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
      .filters { display: flex; gap: 0.3rem; }
      .chip { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 999px; padding: 0.2rem 0.7rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
      .chip.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
      .search { flex: 1; min-width: 8rem; padding: 0.35rem 0.6rem; border: 1px solid var(--border); border-radius: 0.5rem; background: var(--bg); color: var(--fg); font: inherit; font-size: 0.85rem; }

      .rows { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 0.35rem; }
      .rows li { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0; border-top: 1px solid var(--border); }
      .rows li:first-child { border-top: none; }
      .what { flex: 1; }
      .rows li.claimed .what { color: var(--muted); }
      .by { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }
      .del { background: none; color: var(--muted); font-size: 1.2rem; line-height: 1; padding: 0 0.25rem; }
      .del:hover { color: var(--red); filter: none; }
      .count { font-size: 0.72rem; opacity: 0.85; }

      .guest-form { display: flex; align-items: flex-end; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.85rem; }
      .guest-form label { display: flex; flex-direction: column; font-size: 0.75rem; color: var(--muted); gap: 0.2rem; }
      .guest-form input { padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 0.5rem; background: var(--bg); color: var(--fg); font: inherit; }
      .guest-form input[type="number"] { width: 5rem; }
      .total { margin-bottom: 0.5rem; }
      .total strong { color: var(--navy); font-size: 1.15rem; }

      .event-form { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
      .event-form input { padding: 0.45rem 0.65rem; border: 1px solid var(--border); border-radius: 0.5rem; background: var(--bg); color: var(--fg); font: inherit; }
      .event-form-row { display: flex; gap: 0.5rem; }
      .event-form-row input { flex: 1; }
      .day + .day { margin-top: 1rem; }
      .day-head { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--red); margin-bottom: 0.15rem; }
      .event .event-main { flex: 1; display: flex; flex-direction: column; }

      .muted { color: var(--muted); font-size: 0.9rem; }
      footer { padding: 1.5rem 0 3rem; font-size: 0.85rem; text-align: center; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="/app.js"></script>
  </body>
</html>
